<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Pong - Algo Génétique Pur</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
  <h1>Pong - Algorithme Génétique "Aveugle"</h1>
  
  <div class="controls">
    <div class="control-group">
      <label>Taille de Population:</label>
      <input type="range" id="pop-slider" min="10" max="200" step="10" value="50" />
      <span id="pop-val">50</span> matchs
    </div>

    <div class="control-group">
      <label>Taux de Mutation:</label>
      <input type="range" id="mutation-slider" min="0.01" max="0.30" step="0.01" value="0.05" />
      <span id="mutation-val">0.05</span>
    </div>

    <button id="reset-btn">Lancer l'Entraînement</button>
  </div>
  
  <div id="canvas-container"></div>
  
  <div id="stats">
    <p>Génération: <span id="gen-count">0</span></p>
    <p>Meilleur Survie de Gen: <span id="record-time">0</span> sec (<span id="record-frames">0</span> frames)</p>
    <p id="victory-msg" style="display: none; color: lime;">Victoire absolue !</p>
  </div>

  <script src="dna.js"></script>
  <script src="ball.js"></script>
  <script src="paddle.js"></script>
  <script src="population.js"></script>
  <script src="match.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
